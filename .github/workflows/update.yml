name: AeroIntel update

# Pipeline autónomo: recolecta, analiza, puntúa, genera el periódico y lo despliega en
# GitHub Pages (y publica lo crítico a Mattermost si está configurado).
on:
  schedule:
    # OJO: los crons de Actions son "best effort" — GitHub descarta disparos bajo carga.
    # Medido (jul 2026): con 2 disparos/hora la cadencia real fue mediana 101 min y huecos
    # de hasta 5 h. Programar cada 15 min (minutos impares, fuera de la estampida de :00/:30)
    # compra más boletos: aunque descarte la mayoría, la cadencia real ronda los 30-50 min.
    # Las corridas que sí ejecutan son gratis (repo público); el presupuesto LLM lo protege
    # el cortacircuito. Si algún día se necesita cadencia GARANTIZADA: disparar
    # workflow_dispatch desde un cron externo (p. ej. cron-job.org) con un PAT.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}          # permite correrlo a mano desde Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run intelligence pipeline
        env:
          AEROINTEL_LLM: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}   # SkyLink NOTAM API (opcional; sin él, sin sección NOTAM)
          # Presupuesto de IA por corrida acotado al free tier de Groq (cron 30 min). Lo no analizado
          # por IA usa lectura/heurística. Si la cuota diaria se agota, cae a heurística (sin romperse).
          AEROINTEL_LLM_MAX: "10"           # noticias top que reescribe el analista IA
          AEROINTEL_NOTAM_LLM_MAX: "10"     # NOTAMs top que interpreta la IA
          AEROINTEL_LLM_SLEEP: "2.0"        # ritmo entre llamadas (respeta rate limits)
          AEROINTEL_IMG_N: "48"
        run: |
          python3 tests/test_pipeline.py     # los tests deben pasar antes de publicar
          python3 aerointel.py
          cp output/dashboard.html output/index.html   # Pages sirve index.html en la raíz

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deploy
        uses: actions/deploy-pages@v4
