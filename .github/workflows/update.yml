name: AeroIntel update

# Pipeline autónomo: recolecta, analiza, puntúa, genera el periódico y lo despliega en
# GitHub Pages (y publica lo crítico a Mattermost si está configurado).
on:
  schedule:
    # Cada 15 min. El cron de GitHub se retrasa/salta bajo carga, así que programar más
    # seguido da más corridas efectivas → frescura real. Repo público = minutos gratis.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}          # permite correrlo a mano desde Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run intelligence pipeline
        env:
          AEROINTEL_LLM: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}   # SkyLink NOTAM API (opcional; sin él, sin sección NOTAM)
          AEROINTEL_LLM_MAX: "18"
          AEROINTEL_LLM_SLEEP: "2.5"        # prompt analista más largo → ritmo suave para el free tier
          AEROINTEL_IMG_N: "48"
        run: |
          python3 tests/test_pipeline.py     # los tests deben pasar antes de publicar
          python3 aerointel.py
          cp output/dashboard.html output/index.html   # Pages sirve index.html en la raíz

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deploy
        uses: actions/deploy-pages@v4
