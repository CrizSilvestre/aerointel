name: AeroIntel update

# Pipeline autónomo: recolecta, analiza, puntúa, genera el periódico y lo despliega en
# GitHub Pages (y publica lo crítico a Mattermost si está configurado).
on:
  schedule:
    # Cadencia objetivo: ~1 HORA real (decisión 16 jul: menos corridas = menos tokens de Groq
    # y más presupuesto de IA por edición). OJO: los crons de Actions son "best effort" —
    # GitHub descarta ~2/3 de los disparos bajo carga (medido: 2/hora → mediana real 101 min;
    # 4/hora → ~30-50 min). Con 3 boletos/hora la cadencia real ronda la hora. Para frescura
    # inmediata está el botón "Actualizar" del dashboard (límite 30 min del lado del Worker).
    - cron: "7,27,47 * * * *"
  workflow_dispatch: {}          # permite correrlo a mano desde Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run intelligence pipeline
        env:
          AEROINTEL_LLM: groq                          # proveedor primario
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Respaldo automático: si Groq agota su cuota diaria (429), la IA sigue con OpenRouter.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}   # SkyLink NOTAM API (opcional; sin él, sin sección NOTAM)
          # Presupuesto de IA por corrida (free tier de Groq). Con cadencia ~1 h hay MENOS corridas,
          # así que cada una puede analizar MÁS: el top del periódico y el resumen de Mattermost
          # (que copia el top 7) van casi siempre con IA. Si la cuota se agota, cae a heurística.
          AEROINTEL_LLM_MAX: "15"           # noticias top que reescribe el analista IA
          AEROINTEL_NOTAM_LLM_MAX: "10"     # NOTAMs top que interpreta la IA
          AEROINTEL_LLM_SLEEP: "2.0"        # ritmo entre llamadas (respeta rate limits)
          AEROINTEL_IMG_N: "48"
          # Botón "Actualizar" del dashboard: URL pública del Worker (el token vive en el
          # Worker como secret; el límite de 30 min lo aplica el propio Worker).
          AEROINTEL_REFRESH_URL: "https://aerointel-refresh.crizmelvin.workers.dev"
        run: |
          python3 tests/test_pipeline.py     # los tests deben pasar antes de publicar
          python3 aerointel.py
          cp output/dashboard.html output/index.html   # Pages sirve index.html en la raíz

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deploy
        uses: actions/deploy-pages@v4
